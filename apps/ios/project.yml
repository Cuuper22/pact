name: Pact
options:
  bundleIdPrefix: app.pact
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

# ---------------------------------------------------------------------------
# Settings shared by every target. The relay base URL is injected from an
# xcconfig-style user-defined setting so it can be overridden per environment
# without touching code (see README "How to set the relay URL").
# ---------------------------------------------------------------------------
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "" # <-- fill in your 10-char Apple Developer Team ID
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # Default relay origin. Override per-config or via an .xcconfig.
    PACT_RELAY_URL: http://localhost:8787
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_C_LANGUAGE_STANDARD: gnu17

# The App Group both the app and extensions read/write shared state through.
# Keep this in sync with the .entitlements files and AppGroup.suiteName.
fileGroups:
  - project.yml
  - README.md

targets:
  # =========================================================================
  # Main application
  # =========================================================================
  Pact:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Models
      - path: Sources/Networking
      - path: Sources/Shield
      - path: Sources/Screens
      - path: Sources/Theme
      - path: Sources/Shared
    resources:
      - path: Resources/Assets.xcassets
        optional: true
    dependencies:
      - target: ShieldConfiguration
      - target: ShieldAction
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pact
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/Pact.entitlements
        # Surface the build-setting relay URL into Info.plist as PactRelayURL.
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1" # iPhone only
        # The committed Info.plist (Sources/App/Info.plist) is the source of
        # truth; it surfaces PactRelayURL via $(PACT_RELAY_URL). No `info:`
        # block here on purpose — it would regenerate and clobber that file.

  # =========================================================================
  # Custom shield UI — the night screen shown over a blocked app, with the
  # "Ask the table" button.
  # =========================================================================
  ShieldConfiguration:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/ShieldConfiguration
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pact.ShieldConfiguration
        INFOPLIST_FILE: Extensions/ShieldConfiguration/Info.plist
        CODE_SIGN_ENTITLEMENTS: Extensions/ShieldConfiguration/ShieldConfiguration.entitlements

  # =========================================================================
  # Handles taps on the custom shield's buttons ("Ask the table").
  # =========================================================================
  ShieldAction:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/ShieldAction
      - path: Sources/Models
      - path: Sources/Networking
      - path: Sources/Shield
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pact.ShieldAction
        INFOPLIST_FILE: Extensions/ShieldAction/Info.plist
        CODE_SIGN_ENTITLEMENTS: Extensions/ShieldAction/ShieldAction.entitlements

  # =========================================================================
  # Unit tests — pin the wire contract (decode SeatView / frames, encode
  # actions). Hosted by the Pact app so `@testable import Pact` resolves.
  # =========================================================================
  PactTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/PactTests
    dependencies:
      - target: Pact
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pact.PactTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Pact:
    build:
      targets:
        Pact: all
        ShieldConfiguration: all
        ShieldAction: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PactTests
    archive:
      config: Release
